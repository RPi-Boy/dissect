<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dissect - Live Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="stylesD.css">
    
    <style>
        /* --- Simulation Page Specific Layout --- */
        .sim-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            width: 1000px;
            max-width: 95%;
            margin: 0 auto;
            /* Reusing your glassmorphism from scan-card */
            padding: 40px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 80px rgba(0,200,255,0.06);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .section-header {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #7ee8f5;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-tag {
            font-size: 10px;
            background: rgba(255, 51, 102, 0.15);
            color: #ff3366;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 51, 102, 0.3);
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        /* --- Attack Map Graph --- */
        .graph-viz {
            position: relative;
            min-height: 400px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .graph-lines {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
        }

        .node {
            position: absolute;
            z-index: 2;
            background: #0a0c10;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.8);
            transform: translate(-50%, -50%);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .node:hover {
            transform: translate(-50%, -50%) scale(1.05);
            border-color: #7ee8f5;
        }

        .node i { font-size: 20px; color: #7ee8f5; }
        
        /* Node Positions */
        .node-top { top: 20%; left: 50%; }
        .node-center { 
            top: 50%; left: 50%; 
            border-color: #ff3366; 
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.2);
            padding: 16px;
        }
        .node-center i { color: #ff3366; font-size: 24px; }
        .node-bottom-left { top: 80%; left: 30%; }
        .node-bottom-right { top: 80%; left: 70%; }
        .compromised-text { color: #ff3366; }

        /* --- Lateral Spread Bar --- */
        .spread-probability {
            margin-top: 24px;
        }

        .spread-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .high-risk-text { color: #ff3366; }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7ee8f5, #ff3366);
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.5);
            border-radius: 999px;
        }

        /* --- Right Column Controls --- */
        .sim-controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .simulation-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(126, 232, 245, 0.2);
            border-radius: 12px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: inset 0 0 40px rgba(126, 232, 245, 0.02);
        }

        .sim-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
            letter-spacing: 1px;
        }

        .cyan-text { color: #7ee8f5; }
        .sim-desc {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Matches your scan-btn exactly */
        .launch-btn {
            width: 100%;
            height: 56px;
            background: #7ee8f5;
            color: black;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .launch-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(126, 232, 245, 0.45);
            background: #ffffff;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Responsive Layout for smaller screens */
        @media (max-width: 900px) {
            .sim-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="fade-in">
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-shield-halved brand-icon"></i>
            <span>DISSECT</span>
        </div>
        <div class="nav-center">
            <a href="index.html" class="nav-link">HOME</a>
            <a href="dashboard.html" class="nav-link active">DASHBOARD</a>
            <a href="report.html" class="nav-link">REPORT</a>
        </div>
        <div class="nav-right">
            <i class="fa-solid fa-bell nav-icon"></i>
            <i class="fa-solid fa-gear nav-icon"></i>
        </div>
    </nav>

    <main class="main-content">
        
        <div class="sim-wrapper">
            <div class="attack-map-container">
                <div class="section-header">
                    <span>ATTACK PROPAGATION MAP</span>
                    <span class="live-tag"><i class="fa-solid fa-circle-dot" style="font-size: 8px; margin-right: 4px;"></i> LIVE</span>
                </div>
                
                <div class="graph-viz">
                    <div class="node node-top">
                        <i class="fa-solid fa-server"></i>
                        <span>AUTH_CLUSTER</span>
                    </div>
                    <div class="node node-center compromised">
                        <i class="fa-solid fa-network-wired"></i>
                    </div>
                    <div class="node node-bottom-left">
                        <i class="fa-solid fa-database"></i>
                        <span class="compromised-text">CORE_DB_01</span>
                    </div>
                    <div class="node node-bottom-right">
                        <i class="fa-solid fa-cloud"></i>
                        <span>EDGE_NODE</span>
                    </div>
                    
                    <svg class="graph-lines">
                        <line x1="50%" y1="20%" x2="50%" y2="50%" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="4"/>
                        <line x1="50%" y1="50%" x2="30%" y2="80%" stroke="#ff3366" stroke-width="2"/>
                        <line x1="50%" y1="50%" x2="70%" y2="80%" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="4"/>
                    </svg>
                </div>

                <div class="spread-probability">
                    <div class="spread-header">
                        <span>LATERAL SPREAD PROBABILITY</span>
                        <span class="high-risk-text">HIGH RISK (64%)</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 64%;"></div>
                    </div>
                </div>
            </div>

            <div class="sim-controls">
                <div class="simulation-card">
                    <h3 class="sim-title">VULNERABILITY<br><span class="cyan-text">LIVE SIMULATION</span></h3>
                    <p class="sim-desc">Initialize the OpenCV engine to witness the escalation paths in a safe, isolated sandbox environment.</p>
                    <button class="launch-btn">LAUNCH SIMULATION <i class="fa-solid fa-rocket"></i></button>
                </div>
            </div>
        </div>

    </main>
</body>
</html>
